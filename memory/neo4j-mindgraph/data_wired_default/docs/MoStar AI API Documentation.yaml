  /fine-tunes:
    post:
      operationId: createFineTune
      summary: Create a fine-tune job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                training_file:
                  type: string
                validation_file:
                  type: string
                model:
                  type: string
                n_epochs:
                  type: integer
                  default: 4
                batch_size:
                  type: integer
                learning_rate_multiplier:
                  type: number
                prompt_loss_weight:
                  type: number
                  default: 0.01
                compute_classification_metrics:
                  type: boolean
                  default: false
                classification_n_classes:
                  type: integer
                classification_positive_class:
                  type: string
                classification_betas:
                  type: array
                  items:
                    type: number
      responses:
        '200':
          description: Fine-tune job created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  model:
                    type: string
                  created_at:
                    type: integer
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        object:
                          type: string
                        created_at:
                          type: integer
                        level:
                          type: string
                        message:
                          type: string
        '401':
          description: Unauthorized
        '404':
          description: Model not found
        '500':
          description: Server error
