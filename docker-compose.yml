services:
  backend:
    build: ./backend
    container_name: mostar-backend
    env_file:
      - ./backend/.env.prod
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - executor

  executor:
    build: ./backend
    container_name: mostar-executor
    command: python mo_executor.py
    env_file:
      - ./backend/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mostar-cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    restart: unless-stopped
    depends_on:
      - backend
