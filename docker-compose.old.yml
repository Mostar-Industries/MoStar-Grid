version: '3.9'

services:
  # AuraDB Service
  auradb:
    image: neo4j:5.20.0-enterprise # Using Enterprise to support plugins like GDS
    container_name: auradb_db
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt driver port
    volumes:
      - ./auradb/data:/data
      - ./auradb/logs:/logs
      - ./auradb/import:/var/lib/neo4j/import # Place your .cypher or .md files here for import
    environment:
      - NEO4J_AUTH=neo4j/your-strong-password # CHANGE THIS PASSWORD
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes # Required for Enterprise Edition
      - NEO4J_PLUGINS=["apoc", "gds"] # Installs useful plugins like APOC and Graph Data Science

  # Ollama Native Service
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama_native
    ports:
      - "11434:11434"
    depends_on:
      - auradb
    environment:
      - NEO4J_URI=bolt://auradb_db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mostar123
      - NEO4J_DATABASE=neo4j

  # Backend Service
  backend:
    build: ./backend
    container_name: mostar-backend
    env_file:
      - ./backend/.env.prod
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - executor

  # Executor Service
  executor:
    build: ./backend
    container_name: mostar-executor
    command: python mo_executor.py
    env_file:
      - ./backend/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Cloudflared Service
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mostar-cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    restart: unless-stopped
    depends_on:
      - backend